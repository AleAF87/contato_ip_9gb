<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato IP 9GB</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="page-auth">
    <main class="auth-shell">
        <section class="auth-card">
            <span class="eyebrow">Comunicacao em tempo real</span>
            <h1>Contato IP 9GB</h1>
            <p class="subtitle">Entre com seu nome para acessar os canais de audio.</p>

            <form id="login-form" class="form-card">
                <label for="username">Nome do usuario</label>
                <input id="username" name="username" type="text" maxlength="40" placeholder="Ex: Sgt. Silva" autocomplete="off" required>
                <label for="home-channel">Meu canal</label>
                <select id="home-channel" name="home-channel" required>
                    <option value="">Selecione o canal para receber chamadas</option>
                    <option value="ch-em-adm">Ch EM Adm</option>
                    <option value="b3-dejem">B/3 DEJEM</option>
                    <option value="b3-ch-aux">B/3 Ch Aux</option>
                    <option value="b5">B/5</option>
                </select>
                <button type="submit" class="btn btn-primary">Entrar</button>
            </form>

            <p id="login-message" class="helper-text"></p>
        </section>
    </main>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
